# Set to false if the AIS team needs to maintain control over which version of the plugin is installed
# (for compatibility with the server and provided configuration file)
CheckForUpdates: false

Logging:
  LogLevel: Verbose
  MaxFileAgeDays: 1

Server:
  Uri: https://vatpac.maestro.eoinmotherway.dev/hub
  Environments:
  - VATSIM
  - SweatBox-1
  - SweatBox-2
  TimeoutSeconds: 30
  Permissions:
    ChangeTerminalConfiguration: [Flow]
    ChangeLandingRates: [Flow]
    MoveFlight: [Approach, Flow]
    ChangeFeederFixEstimate: [Enroute, Flow]
    ManageSlots: [Flow]
    InsertFlight: [Approach, Flow]
    MakePending: [Enroute, Approach, Flow]
    ChangeRunway: [Enroute, Approach, Flow]
    ManualDelay: [Enroute, Approach, Flow]
    MakeStable: [Enroute, Flow]
    Recompute: [Enroute, Flow]
    Desequence: [Enroute, Approach, Flow]
    Resequence: [Flow]
    RemoveFlight: [Enroute, Approach, Flow]
    ChangeApproachType: [Enroute, Approach, Flow]
    ModifyWind: [Approach, Flow]

Labels:

  GlobalColours:

    States:
      Unstable: 255, 205, 105
      Stable: 0, 0, 96
      SuperStable: 255, 255, 255
      Frozen: 96, 0, 0
      Landed: 0, 235, 235

    ControlActions:
      Expedite: 0, 105, 0
      NoDelay: 0, 0, 96
      Resume: 0, 0, 96
      SpeedReduction: 0, 235, 235
      PathStretching: 255, 255, 255
      Holding: 235, 235, 0

    DeferredRunwayMode: 255, 255, 255

  Layouts:

  - Identifier: Enroute
    Items:
    - {Type: LandingTime, Width: 2, Padding: 1}
    - {Type: Runway, Width: 3, Padding: 1, ColourSources: [RunwayMode, Runway]}
    - {Type: Callsign, Width: 10, Padding: 1, ColourSources: [State]}
    - {Type: ApproachType, Width: 1, Padding: 1, ColourSources: [ApproachType]}
    - {Type: HighSpeed, Width: 1, Padding: 0, Symbol: '+'}
    - {Type: ManualDelay, Width: 1, Padding: 0, ZeroDelaySymbol: '#', ManualDelaySymbol: '%'}
    - {Type: CouplingStatus, Width: 1, Padding: 1, UncoupledSymbol: '*'}
    - {Type: RequiredDelay, Width: 3, Padding: 1, ColourSources: [ControlAction]}
    - {Type: RemainingDelay, Width: 3, Padding: 0, ColourSources: [ControlAction]}
    
  - Identifier: TMA
    Items:
    - {Type: FeederFixTime, Width: 2, Padding: 1}
    - {Type: Runway, Width: 3, Padding: 1, ColourSources: [RunwayMode, Runway]}
    - {Type: Callsign, Width: 10, Padding: 1, ColourSources: [State]}
    - {Type: ApproachType, Width: 1, Padding: 1, ColourSources: [ApproachType]}
    - {Type: HighSpeed, Width: 1, Padding: 0, Symbol: '+'}
    - {Type: ManualDelay, Width: 1, Padding: 0, ZeroDelaySymbol: '#', ManualDelaySymbol: '%'}
    - {Type: CouplingStatus, Width: 1, Padding: 1, UncoupledSymbol: '*'}
    - {Type: RemainingDelay, Width: 3, Padding: 0, ColourSources: [ControlAction]}
    
  - Identifier: SY_FMP
    Items:
    - {Type: Callsign, Width: 10, Padding: 1, ColourSources: [FeederFix, State]}
    - {Type: AircraftWakeCategory, Width: 1, Padding: 1, ColourSources: [FeederFix, State]}
    - {Type: ManualDelay, Width: 1, Padding: 0, ZeroDelaySymbol: '#', ManualDelaySymbol: '%'}
    - {Type: CouplingStatus, Width: 1, Padding: 1, UncoupledSymbol: '*'}
    - {Type: RequiredDelay, Width: 3, Padding: 1, ColourSources: [State]}
    - {Type: RemainingDelay, Width: 3, Padding: 1, ColourSources: [State]}
    - {Type: HighSpeed, Width: 1, Padding: 0, Symbol: '+'}

Airports:
- Identifier: YSSY
  FeederFixes: [RIVET, WELSH, BOREE, YAKKA, MARLN]
  Runways: [34L, 34R, 16L, 16R, "07", "25"]
  DefaultAircraftType: B738
  DefaultPendingFlightState: Stable
  DefaultDepartureFlightState: Unstable
  DefaultDummyFlightState: Frozen
  MinimumUnstableMinutes: 5
  StabilityThresholdMinutes: 25
  FrozenThresholdMinutes: 15
  MaxLandedFlights: 5
  LandedFlightTimeoutMinutes: 10
  LostFlightTimeoutMinutes: 10

  Colours:
    FeederFixes:
      RIVET: 96, 0, 0
      WELSH: 96, 0, 0
      BOREE: 0, 235, 235
      YAKKA: 0, 235, 235
      MARLN: 0, 105, 0

  RunwayModes:

  # 24 landings per hour = 150s
  - Identifier: 34IVA
    Runways:
    - {Identifier: 34L, LandingRateSeconds: 150, FeederFixes: [RIVET, WELSH]}
    - {Identifier: 34R, LandingRateSeconds: 150, FeederFixes: [BOREE, YAKKA, MARLN]}

  # 20 landings per hour = 180s
  - Identifier: 34I
    DependencyRateSeconds: 60
    Runways:
    - {Identifier: 34L, LandingRateSeconds: 180, FeederFixes: [RIVET, WELSH]}
    - {Identifier: 34R, LandingRateSeconds: 180, FeederFixes: [BOREE, YAKKA, MARLN]}

  # 24 landings per hour = 150s
  - Identifier: 16IVA
    Runways:
    - {Identifier: 16R, LandingRateSeconds: 150, FeederFixes: [RIVET, WELSH]}
    - {Identifier: 16L, LandingRateSeconds: 150, FeederFixes: [BOREE, YAKKA, MARLN]}

  # 20 landings per hour = 180s
  - Identifier: 16I
    DependencyRateSeconds: 60
    Runways:
    - {Identifier: 16R, LandingRateSeconds: 180, FeederFixes: [RIVET, WELSH]}
    - {Identifier: 16L, LandingRateSeconds: 180, FeederFixes: [BOREE, YAKKA, MARLN]}

  # 25 landings per hour = 144s
  - Identifier: 25I
    Runways:
    - {Identifier: "25", LandingRateSeconds: 144}

  # 25 landings per hour = 144s
  - Identifier: 07I
    Runways:
    - {Identifier: "07", LandingRateSeconds: 144}

  # 24 landings per hour = 150s
  - Identifier: SODPROPS
    Runways:
    - {Identifier: 34L, LandingRateSeconds: 150}


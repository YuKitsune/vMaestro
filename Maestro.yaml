Logging:
  LogLevel: Information
  MaxFileAgeDays: 7

Server:
  Uri: https://maestro.eoinmotherway.dev/hub
  Partitions:
  - VATSIM
  - SweatBox-1
  - SweatBox-2
  TimeoutSeconds: 30
  Permissions:
    ChangeTerminalConfiguration: [Flow]
    ChangeLandingRates: [Flow]
    MoveFlight: [Approach, Flow]
    ChangeFeederFixEstimate: [Enroute, Flow]
    ManageSlots: [Flow]
    InsertFlight: [Approach, Flow]
    MakePending: [Enroute, Approach, Flow]
    ChangeRunway: [Enroute, Approach, Flow]
    ManualDelay: [Enroute, Approach, Flow]
    MakeStable: [Enroute, Flow]
    Recompute: [Enroute, Flow]
    Desequence: [Enroute, Approach, Flow]
    Resequence: [Flow]
    RemoveFlight: [Enroute, Approach, Flow]
    ChangeApproachType: [Enroute, Approach, Flow]

Labels:

  Colours:

    States:
      Unstable: 255,205,105
      Stable: 0, 0, 96
      SuperStable: 255, 255, 255
      Frozen: 96, 0, 0
      Landed: 0, 235, 235

    ControlActions:
      Expedite: 0, 105, 0
      NoDelay: 0, 0, 96
      Resume: 0, 0, 96
      SpeedReduction: 0, 235, 235
      PathStretching: 255, 255, 255
      Holding: 235, 235, 0

    DeferredRunwayMode: 255,255,255

  Layouts:

  - Identifier: Enroute
    Items:
    - {Type: FeederFixTime, Width: 2, ColourSources: [State]}
    - {Type: Runway, Width: 3, ColourSources: [RunwayMode, Runway, State]}
    - {Type: Callsign, Width: 10, ColourSources: [State]}
    - {Type: ApproachType, Width: 1, ColourSources: [ApproachType, State]}
    - {Type: ManualDelay, Width: 1, Padding: 0, ColourSources: [State], ZeroDelaySymbol: '#', ManualDelaySymbol: '%'}
    - {Type: ProfileSpeed, Width: 1, Padding: 0, ColourSources: [State], Symbol: +}
    - {Type: CouplingStatus, Width: 1, Padding: 0, ColourSources: [State], UncoupledSymbol: '*'}
    - {Type: RequiredDelay, Width: 2, ColourSources: [ControlAction], ZeroDelaySymbol: '#'}
    - {Type: RemainingDelay, Width: 2, Padding: 0, ColourSources: [ControlAction]}
    
  - Identifier: TMA
    Items:
    - {Type: LandingTime, Width: 2, ColourSources: [State]}
    - {Type: Runway, Width: 3, ColourSources: [RunwayMode, Runway, State]}
    - {Type: Callsign, Width: 10, ColourSources: [State]}
    - {Type: ApproachType, Width: 1, ColourSources: [ApproachType, State]}
    - {Type: ManualDelay, Width: 1, Padding: 0, ColourSources: [State], ZeroDelaySymbol: '#', ManualDelaySymbol: '%'}
    - {Type: ProfileSpeed, Width: 1, Padding: 0, ColourSources: [State], Symbol: +}
    - {Type: CouplingStatus, Width: 1, Padding: 0, ColourSources: [State], UncoupledSymbol: '*'}
    - {Type: RemainingDelay, Width: 2, Padding: 0, ColourSources: [ControlAction]}

